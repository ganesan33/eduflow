<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="loginCard">
            <div class="brand-header">
                <img src="/assets/logo.png" alt="EduFlow Logo" class="logo">
                <h1>EduFlow</h1>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div id="loginErrorMessage" class="error-message"></div>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="#" id="showSignup">Create Account</a></p>
            </div>
        </div>

        <div class="auth-card" id="signupCard" style="display: none;">
            <div class="brand-header">
                <img src="/assets/logo.png" alt="EduFlow Logo" class="logo">
                <h1>Create Account</h1>
            </div>
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password (min 8 characters)</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Create password" minlength="8" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <div class="role-selector">
                        <input type="radio" name="role" id="studentRole" value="student" checked>
                        <label for="studentRole" class="role-option">
                            <i class="fas fa-user-graduate"></i>
                            <span>Student</span>
                        </label>
                        
                        <input type="radio" name="role" id="instructorRole" value="instructor">
                        <label for="instructorRole" class="role-option">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <span>Instructor</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span>Create Account</span>
                    <i class="fas fa-user-plus"></i>
                </button>
                <div id="signupErrorMessage" class="error-message"></div>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="#" id="showLogin">Sign In</a></p>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
