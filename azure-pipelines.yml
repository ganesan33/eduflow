# Azure DevOps CI/CD Pipeline for EduFlow
# Triggers on push to main branch
# Last updated: 2026-04-05

trigger:
  branches:
    include:
      - main

pool:
  name: 'Eduflowagent'

variables:
  registryName: 'eduflowregistry'
  registryUrl: 'eduflowregistry.azurecr.io'
  backendImage: 'eduflow-backend'
  frontendImage: 'eduflow-frontend'
  resourceGroup: 'eduflow-rg'
  backendAppName: 'eduflow-backend'
  frontendAppName: 'eduflow-frontend'
  backendApiUrl: 'https://eduflow-backend.azurewebsites.net'

stages:
  - stage: Build
    displayName: 'Build Docker Images'
    jobs:
      - job: BuildBackend
        displayName: 'Build Backend Image'
        steps:
          - task: Docker@2
            displayName: 'Build and Push Backend Image'
            inputs:
              containerRegistry: 'ACR-ServiceConnection'
              repository: '$(backendImage)'
              command: 'buildAndPush'
              Dockerfile: 'backend/Dockerfile'
              buildContext: 'backend'
              tags: |
                latest
                $(Build.BuildId)
      
      - job: BuildFrontend
        displayName: 'Build Frontend Image'
        steps:
          - script: |
              echo "=========================================="
              echo "Building frontend with API URL: $(backendApiUrl)"
              echo "VITE_API_URL will be set to: $(backendApiUrl)"
              echo "=========================================="
            displayName: 'Debug: Print API URL'
          
          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              containerRegistry: 'ACR-ServiceConnection'
              repository: '$(frontendImage)'
              command: 'build'
              Dockerfile: 'frontend/Dockerfile'
              buildContext: 'frontend'
              arguments: '--no-cache --build-arg VITE_API_URL=$(backendApiUrl)'
              tags: |
                latest
                $(Build.BuildId)
          
          - task: Docker@2
            displayName: 'Push Frontend Image'
            inputs:
              containerRegistry: 'ACR-ServiceConnection'
              repository: '$(frontendImage)'
              command: 'push'
              tags: |
                latest
                $(Build.BuildId)

  - stage: Deploy
    displayName: 'Deploy to Azure App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployApps
        displayName: 'Deploy App Services'
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy Backend Container'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "Deploying backend container build $(Build.BuildId)..."
                
                # Update container image
                az webapp config container set `
                  --name $(backendAppName) `
                  --resource-group $(resourceGroup) `
                  --docker-custom-image-name $(registryUrl)/$(backendImage):$(Build.BuildId)
                
                # Enable continuous deployment to force pull
                az webapp deployment container config `
                  --name $(backendAppName) `
                  --resource-group $(resourceGroup) `
                  --enable-cd true
                
                # Stop the app
                az webapp stop --name $(backendAppName) --resource-group $(resourceGroup)
                Start-Sleep -Seconds 5
                
                # Start the app (forces fresh pull)
                az webapp start --name $(backendAppName) --resource-group $(resourceGroup)
                
                Write-Host "Backend deployed successfully"
          
          - task: AzureCLI@2
            displayName: 'Deploy Frontend Container'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "Deploying frontend container build $(Build.BuildId)..."
                
                # Update container image
                az webapp config container set `
                  --name $(frontendAppName) `
                  --resource-group $(resourceGroup) `
                  --docker-custom-image-name $(registryUrl)/$(frontendImage):$(Build.BuildId)
                
                # Enable continuous deployment to force pull
                az webapp deployment container config `
                  --name $(frontendAppName) `
                  --resource-group $(resourceGroup) `
                  --enable-cd true
                
                # Stop the app
                az webapp stop --name $(frontendAppName) --resource-group $(resourceGroup)
                Start-Sleep -Seconds 5
                
                # Start the app (forces fresh pull)
                az webapp start --name $(frontendAppName) --resource-group $(resourceGroup)
                
                Write-Host "Frontend deployed successfully"
          
          - task: AzureCLI@2
            displayName: 'Verify Deployment'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "Waiting for apps to restart..."
                Start-Sleep -Seconds 30
                Write-Host "Testing backend health..."
                try {
                  $response = Invoke-WebRequest -Uri "$(backendApiUrl)/api/health" -UseBasicParsing
                  if ($response.StatusCode -eq 200) {
                    Write-Host "Backend is healthy!"
                    Write-Host "Deployment completed successfully"
                  } else {
                    Write-Host "Backend health check failed with status: $($response.StatusCode)"
                    exit 1
                  }
                } catch {
                  Write-Host "Backend health check failed: $_"
                  exit 1
                }